name: Pull request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PREVIEW_WORKER_NAME: elianacorre-com-preview

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Oxfmt and Oxlint
        run: bun run check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run type checking
        run: bun run typecheck

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build production applications
        run: bun run build

  preview:
    name: Preview
    needs: [quality, typecheck, tests, build]
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.preview-url.outputs.url }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Deploy isolated Convex backend and build application
        working-directory: packages/backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: >-
          bunx convex deploy
          --preview-name "pr-${{ github.event.pull_request.number }}"
          --cmd "cd ../../apps/solid && bun run build"
          --cmd-url-env-var-name VITE_CONVEX_URL
          --message "PR #${{ github.event.pull_request.number }} at ${{ github.event.pull_request.head.sha }}"
      - name: Bootstrap Cloudflare preview Worker
        working-directory: apps/solid
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if ! bunx wrangler versions list --name "$PREVIEW_WORKER_NAME" > /dev/null 2>&1; then
            bunx wrangler deploy \
              --name "$PREVIEW_WORKER_NAME" \
              --tag "bootstrap-${{ github.event.pull_request.head.sha }}" \
              --message "Bootstrap preview Worker from PR #${{ github.event.pull_request.number }}" \
              --keep-vars
          fi
      - name: Upload Cloudflare preview version
        working-directory: apps/solid
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
        run: >-
          bunx wrangler versions upload
          --name "$PREVIEW_WORKER_NAME"
          --preview-alias "$PREVIEW_ALIAS"
          --tag "${{ github.event.pull_request.head.sha }}"
          --message "PR #${{ github.event.pull_request.number }}"
          --keep-vars
      - name: Record preview URL
        id: preview-url
        env:
          PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
          WORKERS_SUBDOMAIN: ${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}
        run: echo "url=https://${PREVIEW_ALIAS}-${PREVIEW_WORKER_NAME}.${WORKERS_SUBDOMAIN}.workers.dev" >> "$GITHUB_OUTPUT"
      - name: Attach preview to pull request
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PREVIEW_URL: ${{ steps.preview-url.outputs.url }}
        with:
          script: |
            const marker = "<!-- elianacorre-preview -->";
            const body = [
              marker,
              "## Preview deployment",
              "",
              `- URL: ${process.env.PREVIEW_URL}`,
              `- Commit: \`${context.payload.pull_request.head.sha}\``,
              `- Convex data: isolated preview deployment \`pr-${context.issue.number}\``,
              `- Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join("\n");
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { ...context.repo, issue_number: context.issue.number, per_page: 100 },
            );
            const previous = comments.find(
              (comment) =>
                comment.user?.type === "Bot" && comment.body?.includes(marker),
            );
            if (previous) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  approval:
    name: Approval
    if: github.event.pull_request.draft == false
    needs: [preview]
    runs-on: ubuntu-latest
    environment: pull-request-approval
    steps:
      - name: Record approval
        run: echo "Pull request approved by the protected environment reviewer."
