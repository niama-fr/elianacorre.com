name: Deploy production

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable semantic version without the v prefix, for example 1.2.0
        required: true
        type: string
      reason:
        description: Reason for the production release
        required: true
        type: string

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: read
    outputs:
      sha: ${{ steps.release.outputs.sha }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve validated staging release
        id: release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        with:
          script: |
            if (context.ref !== "refs/heads/main") {
              core.setFailed("Production releases must be dispatched from main.");
              return;
            }

            const version = process.env.RELEASE_VERSION;
            const versionPattern = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/;
            if (!versionPattern.test(version)) {
              core.setFailed(`Version ${version} is not a stable semantic version.`);
              return;
            }

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { ...context.repo, per_page: 100 },
            );
            const releasedVersions = releases
              .filter((release) => !release.draft && !release.prerelease)
              .map((release) => release.tag_name.match(/^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/))
              .filter((match) => match !== null)
              .map((match) => match.slice(1).map(Number));
            const candidate = version.split(".").map(Number);
            const compareVersions = (left, right) => {
              for (let index = 0; index < left.length; index += 1) {
                if (left[index] !== right[index]) return left[index] - right[index];
              }
              return 0;
            };

            if (releasedVersions.length === 0 && version !== "1.0.0") {
              core.setFailed("The first production release must be 1.0.0.");
              return;
            }
            if (releasedVersions.some((released) => compareVersions(candidate, released) <= 0)) {
              core.setFailed(`Version ${version} must be greater than every existing production release.`);
              return;
            }

            const tag = `v${version}`;
            try {
              await github.rest.git.getRef({ ...context.repo, ref: `tags/${tag}` });
              core.setFailed(`Tag ${tag} already exists.`);
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              { ...context.repo, environment: "staging", per_page: 100 },
            );

            for (const deployment of deployments) {
              const statuses = await github.paginate(
                github.rest.repos.listDeploymentStatuses,
                { ...context.repo, deployment_id: deployment.id, per_page: 100 },
              );
              if (statuses.some((status) => status.state === "success")) {
                core.setOutput("sha", deployment.sha);
                core.setOutput("tag", tag);
                return;
              }
            }

            core.setFailed("No successful staging deployment exists.");

  deploy:
    name: Production
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    permissions:
      contents: write
    env:
      DEPLOY_SHA: ${{ needs.prepare.outputs.sha }}
      RELEASE_REASON: ${{ inputs.reason }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Check out validated staging commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - name: Verify deployment commit
        run: test "$(git rev-parse HEAD)" = "$DEPLOY_SHA"
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Deploy Convex backend and build application
        working-directory: packages/backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: >-
          bunx convex deploy --cmd "cd ../../apps/web && bun run build" --cmd-url-env-var-name VITE_CONVEX_URL --message "GitHub release ${RELEASE_TAG} at ${DEPLOY_SHA}"
      - name: Seed administrator profiles
        working-directory: packages/backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: bunx convex run seed:init
      - name: Deploy Cloudflare Worker
        working-directory: apps/web
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          bunx wrangler deploy --name elianacorre-com --tag "$DEPLOY_SHA" --message "GitHub release ${RELEASE_TAG} at ${DEPLOY_SHA}" --keep-vars
      - name: Create GitHub Release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const workflowUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Reason: ${process.env.RELEASE_REASON}`,
              `Commit: \`${process.env.DEPLOY_SHA}\``,
              `Workflow: ${workflowUrl}`,
            ].join("\n\n");
            const release = await github.rest.repos.createRelease({
              ...context.repo,
              tag_name: process.env.RELEASE_TAG,
              target_commitish: process.env.DEPLOY_SHA,
              name: process.env.RELEASE_TAG,
              body,
              generate_release_notes: true,
              make_latest: "true",
            });
            core.setOutput("url", release.data.html_url);
      - name: Record deployment summary
        run: |
          {
            echo "## Production release ${RELEASE_TAG}"
            echo
            echo "- Commit: \`${DEPLOY_SHA}\`"
            echo "- Reason: ${RELEASE_REASON}"
            echo "- URL: ${{ vars.PRODUCTION_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"
