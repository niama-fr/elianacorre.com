name: Deploy production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA or tag to deploy as a known-good rollback
        required: true
        type: string
      reason:
        description: Reason for the manual deployment
        required: true
        type: string

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Check out deployment commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
      - name: Record deployment commit
        run: echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Require a commit from main
        run: |
          git fetch origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$DEPLOY_SHA" origin/main
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Deploy Convex backend and build application
        working-directory: packages/backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: >-
          bunx convex deploy
          --cmd "cd ../../apps/web && bun run build"
          --cmd-url-env-var-name VITE_CONVEX_URL
          --message "GitHub deployment ${DEPLOY_SHA}"
      - name: Seed administrator profiles
        working-directory: packages/backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: bunx convex run profiles:seed
      - name: Deploy Cloudflare Worker
        working-directory: apps/web
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          bunx wrangler deploy
          --name elianacorre-com
          --tag "$DEPLOY_SHA"
          --message "GitHub deployment ${DEPLOY_SHA}"
          --keep-vars
      - name: Record deployment summary
        run: |
          {
            echo "## Production deployment"
            echo
            echo "- Commit: \`${DEPLOY_SHA}\`"
            echo "- Reason: ${{ inputs.reason }}"
            echo "- URL: ${{ vars.PRODUCTION_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"
