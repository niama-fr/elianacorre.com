name: Roll back production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing production release tag, for example v1.2.0
        required: true
        type: string
      scope:
        description: Roll back only the Worker unless Convex compatibility has been explicitly verified
        required: true
        default: worker
        type: choice
        options:
          - worker
          - worker-and-convex
      reason:
        description: Incident or reason for rollback
        required: true
        type: string

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare rollback
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha: ${{ steps.release.outputs.sha }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve production release
        id: release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          ROLLBACK_TAG: ${{ inputs.tag }}
        with:
          script: |
            const tag = process.env.ROLLBACK_TAG;
            const tagPattern = /^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/;
            if (!tagPattern.test(tag)) {
              core.setFailed(`Tag ${tag} is not a stable production release tag.`);
              return;
            }

            try {
              const release = await github.rest.repos.getReleaseByTag({ ...context.repo, tag });
              if (release.data.draft || release.data.prerelease) {
                core.setFailed(`Release ${tag} is not a published stable release.`);
                return;
              }
              const commit = await github.rest.repos.getCommit({ ...context.repo, ref: tag });
              core.setOutput("sha", commit.data.sha);
              core.setOutput("tag", tag);
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(`Release ${tag} does not exist.`);
                return;
              }
              throw error;
            }

  rollback:
    name: Production rollback
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    permissions:
      contents: read
    env:
      ROLLBACK_SHA: ${{ needs.prepare.outputs.sha }}
      ROLLBACK_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Check out release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - name: Verify rollback commit
        run: test "$(git rev-parse HEAD)" = "$ROLLBACK_SHA"
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Deploy compatible Convex rollback and build application
        if: inputs.scope == 'worker-and-convex'
        working-directory: packages/backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: >-
          bunx convex deploy
          --cmd "cd ../../apps/web && bun run build"
          --cmd-url-env-var-name VITE_CONVEX_URL
          --message "Rollback to ${ROLLBACK_TAG} at ${ROLLBACK_SHA}"
      - name: Seed administrator profiles after Convex rollback
        if: inputs.scope == 'worker-and-convex'
        working-directory: packages/backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: bunx convex run profiles:seed
      - name: Build Worker-only rollback
        if: inputs.scope == 'worker'
        working-directory: apps/web
        env:
          VITE_CONVEX_URL: ${{ vars.CONVEX_URL }}
        run: bun run build
      - name: Deploy rollback Worker
        working-directory: apps/web
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          bunx wrangler deploy
          --name elianacorre-com
          --tag "$ROLLBACK_SHA"
          --message "Rollback to ${ROLLBACK_TAG}: ${{ inputs.reason }}"
          --keep-vars
      - name: Record rollback summary
        run: |
          {
            echo "## Production rollback"
            echo
            echo "- Release: \`${ROLLBACK_TAG}\`"
            echo "- Commit: \`${ROLLBACK_SHA}\`"
            echo "- Scope: ${{ inputs.scope }}"
            echo "- Reason: ${{ inputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"
