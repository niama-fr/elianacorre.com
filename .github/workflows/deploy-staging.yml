name: Deploy staging

on:
  push:
    branches: [main]

concurrency:
  group: staging
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: Check out merged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Record deployment commit
        run: echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Deploy Convex staging and build application
        working-directory: packages/backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: >-
          bunx convex deploy
          --cmd "cd ../../apps/web && bun run build"
          --cmd-url-env-var-name VITE_CONVEX_URL
          --message "GitHub staging deployment ${DEPLOY_SHA}"
      - name: Seed administrator profiles
        working-directory: packages/backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: bunx convex run seed:init
      - name: Deploy Cloudflare staging Worker
        working-directory: apps/web
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          bunx wrangler deploy
          --name elianacorre-com-staging
          --tag "$DEPLOY_SHA"
          --message "GitHub staging deployment ${DEPLOY_SHA}"
          --keep-vars
      - name: Record deployment summary
        run: |
          {
            echo "## Staging deployment"
            echo
            echo "- Commit: \`${DEPLOY_SHA}\`"
            echo "- URL: ${{ vars.STAGING_URL }}"
            echo "- Convex: isolated staging project"
          } >> "$GITHUB_STEP_SUMMARY"
